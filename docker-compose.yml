version: "3.9"

# WanderPlan — local development stack
# Usage: docker compose up --build
# Requires: .env (copy from .env.example and fill in secrets)

x-common-env: &common-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: wanderplan
  DB_USER: postgres
  DB_PASSWORD: postgres
  KAFKA_BROKERS: kafka:9092
  ENV: development

x-common-depends: &common-depends
  postgres:
    condition: service_healthy
  kafka:
    condition: service_healthy

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wanderplan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro   # runs 000001_init.up.sql on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── Backend services ────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./backend
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AUTH_SERVICE_ADDR: auth-service:8081
      TRIP_SERVICE_GRPC_ADDR: trip-service:9082
      USER_SERVICE_GRPC_ADDR: user-service:9083
      TRIP_SERVICE_ADDR: trip-service:8082
      USER_SERVICE_ADDR: user-service:8083
      COLLAB_SERVICE_ADDR: collaboration-service:8084
      NOTIFY_SERVICE_ADDR: notification-service:8085
      SEARCH_SERVICE_ADDR: search-service:8086
    depends_on:
      <<: *common-depends
      auth-service:
        condition: service_started
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      <<: *common-env
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    depends_on:
      <<: *common-depends
    restart: unless-stopped

  trip-service:
    build:
      context: ./backend
      dockerfile: services/trip-service/Dockerfile
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      <<: *common-env
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    depends_on:
      <<: *common-depends
    restart: unless-stopped

  user-service:
    build:
      context: ./backend
      dockerfile: services/user-service/Dockerfile
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      <<: *common-env
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      TRIP_SERVICE_GRPC_ADDR: trip-service:9082
    depends_on:
      <<: *common-depends
      trip-service:
        condition: service_started
    restart: unless-stopped

  collaboration-service:
    build:
      context: ./backend
      dockerfile: services/collaboration-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      <<: *common-env
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    depends_on:
      <<: *common-depends
    restart: unless-stopped

  notification-service:
    build:
      context: ./backend
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      <<: *common-env
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    depends_on:
      <<: *common-depends
    restart: unless-stopped

  search-service:
    build:
      context: ./backend
      dockerfile: services/search-service/Dockerfile
    ports:
      - "8086:8086"
    environment:
      <<: *common-env
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
    depends_on:
      <<: *common-depends
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  zookeeper_data:
  kafka_data:
  prometheus_data:
  grafana_data:
