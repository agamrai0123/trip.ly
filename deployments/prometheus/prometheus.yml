global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8080"]
    metrics_path: /metrics

  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:8081"]
    metrics_path: /metrics

  - job_name: trip-service
    static_configs:
      - targets: ["trip-service:8082"]
    metrics_path: /metrics

  - job_name: user-service
    static_configs:
      - targets: ["user-service:8083"]
    metrics_path: /metrics

  - job_name: collaboration-service
    static_configs:
      - targets: ["collaboration-service:8084"]
    metrics_path: /metrics

  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:8085"]
    metrics_path: /metrics

  - job_name: search-service
    static_configs:
      - targets: ["search-service:8086"]
    metrics_path: /metrics
